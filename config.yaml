# Non-secret application configuration.
# Secrets (API keys) live in .env — see .env.example.

# Currency pairs analysed. For a USD event these majors move mostly on the same
# USD leg, so treat them as one USD factor rather than three independent signals.
pairs:
  - EUR/USD
  - GBP/USD
  - USD/JPY

# Return measurement horizons after an event, in hours.
windows_hours:
  - 1
  - 4
  - 24

# Local data locations (relative to the repo root).
paths:
  data_dir: data
  prices_dir: data/prices
  documents_dir: data/documents

# LLM provider used for predictions: groq, gemini or openai (keys in .env).
llm_provider: groq
llm_temperature: 0.0
