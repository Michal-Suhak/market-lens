name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: quality-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Black (format check)
        run: uv run black --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Pytest
        run: uv run pytest
