name: Setup Python environment
description: Install uv and sync the project's dependencies on Python 3.13.

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        python-version: "3.13"
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --locked
